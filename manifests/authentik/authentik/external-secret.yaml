apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-credentials
  namespace: authentik
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: authentik-credentials
    creationPolicy: Owner
  data:
    - secretKey: authentik-key
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: d042ee67-3fa6-4ef7-8871-b40d0127a07b
        property: password
 
    - secretKey: postgres-password
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 05e85e66-f6cd-4e52-9072-b40d0127d827
        property: password
