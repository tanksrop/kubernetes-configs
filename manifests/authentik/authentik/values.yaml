authentik:
  secret_key: "env://AUTHENTIK_SECRET_KEY"
  error_reporting:
    enabled: false
  postgresql:
    password: "env://AUTHENTIK_POSTGRESQL__PASSWORD"

server:
  ingress:
    enabled: false
  volumes:
    - name: authentik-storage
      persistentVolumeClaim:
        claimName: authentik-nfs
  volumeMounts:
    - name: authentik-storage
      mountPath: /data/media
      subPath: authentik/media

worker:
  volumes:
    - name: authentik-storage
      persistentVolumeClaim:
        claimName: authentik-nfs
  volumeMounts:
    - name: authentik-storage
      mountPath: /data/media
      subPath: authentik/media

postgresql:
  enabled: true
  auth:
    username: "authentik"
    database: "authentik"
    existingSecret: "authentik-credentials"
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "postgres-password"
  primary:
    persistence:
      enabled: true
      existingClaim: "authentik-nfs"
      subPath: authentik/postgresql

global:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-credentials
          key: authentik-key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-credentials
          key: postgres-password
