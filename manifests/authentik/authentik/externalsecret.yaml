apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: d042ee67-3fa6-4ef7-8871-b40d0127a07b
        property: password
    - secretKey: postgresql-password
      remoteRef:
        key: 05e85e66-f6cd-4e52-9072-b40d0127d827
        property: password
