apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
target:
    name: authentik  # write into the same secret the pod reads
    creationPolicy: Merge  # merge into existing secret, not replace
  data:
    - secretKey: AUTHENTIK_SECRET_KEY  # exact env var name the pod expects
      remoteRef:
        key: d042ee67-3fa6-4ef7-8871-b40d0127a07b
        property: password
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD  # exact env var for postgres
      remoteRef:
        key: 05e85e66-f6cd-4e52-9072-b40d0127d827
        property: password
